name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set version in Info.plist
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.version.outputs.VERSION }}" Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ steps.version.outputs.VERSION }}" Info.plist

      - name: Build with xcodebuild
        run: |
          xcodebuild -project ClaudeMeter.xcodeproj \
            -scheme ClaudeMeter \
            -configuration Release \
            -derivedDataPath build \
            build

      - name: Package app
        run: |
          cd build/Build/Products/Release
          zip -r -y ../../../../ClaudeMeter.zip ClaudeMeter.app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ClaudeMeter.zip
          generate_release_notes: true
