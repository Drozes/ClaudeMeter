name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build with swiftc
        run: |
          swiftc ClaudeMeter.swift Constants.swift UsageModels.swift \
            UsageScraper.swift UsageContentView.swift AppUpdater.swift \
            ClaudeDesktopCookies.swift \
            -framework Cocoa \
            -framework WebKit \
            -framework Security \
            -lsqlite3 \
            -parse-as-library \
            -o ClaudeMeter

      - name: Run unit tests
        run: |
          swiftc Constants.swift UsageModels.swift UsageScraper.swift \
            UsageContentView.swift AppUpdater.swift ClaudeDesktopCookies.swift \
            ClaudeMeterTests.swift \
            -framework Cocoa \
            -framework WebKit \
            -framework Security \
            -lsqlite3 \
            -parse-as-library \
            -o ClaudeMeterTests
          ./ClaudeMeterTests

      - name: Build with xcodebuild
        run: |
          xcodebuild -project ClaudeMeter.xcodeproj \
            -scheme ClaudeMeter \
            -configuration Release \
            build
